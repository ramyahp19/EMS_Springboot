<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EMS - Add Employee</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;

        background: url("https://images.unsplash.com/photo-1553877522-43269d4ea984?auto=format&fit=crop&w=1600&q=80")
        no-repeat center center/cover;

        position: relative;
        overflow: hidden;
    }

    body::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(120deg, rgba(0,0,0,0.75), rgba(0,0,0,0.4));
    }

    /* floating glow */
    .glow {
        position: absolute;
        width: 350px;
        height: 350px;
        background: rgba(0,198,255,0.25);
        filter: blur(90px);
        border-radius: 50%;
        top: 10%;
        left: 5%;
        animation: float 8s infinite ease-in-out;
    }

    @keyframes float {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(-40px); }
    }

    /* MAIN WRAPPER */
    .wrapper {
        position: relative;
        z-index: 2;
        width: 90%;
        max-width: 1000px;

        display: flex;
        gap: 40px;
        align-items: center;
    }

    /* LEFT INFO PANEL */
    .info {
        flex: 1;
        color: white;
    }

    .info h1 {
        font-size: 42px;
        margin-bottom: 10px;
    }

    .info p {
        opacity: 0.85;
        line-height: 1.6;
        font-size: 15px;
    }

    .badge {
        display: inline-block;
        padding: 6px 14px;
        background: rgba(255,255,255,0.15);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 20px;
        font-size: 12px;
        margin-bottom: 12px;
    }

    /* FORM CARD */
    .card {
        flex: 1;
        background: rgba(255,255,255,0.12);
        backdrop-filter: blur(15px);

        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 18px;

        padding: 30px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        animation: fadeIn 0.8s ease;
    }

    .card h2 {
        text-align: center;
        color: white;
        margin-bottom: 20px;
        font-size: 24px;
    }

    .form-group {
        margin-bottom: 14px;
    }

    label {
        display: block;
        margin-bottom: 6px;
        color: #fff;
        font-size: 13px;
    }

    input {
        width: 100%;
        padding: 12px 14px;
        border-radius: 10px;

        border: 1px solid rgba(255,255,255,0.3);
        outline: none;

        background: rgba(255,255,255,0.9);
        font-size: 14px;

        transition: 0.3s;
    }

    input:focus {
        border-color: #00c6ff;
        box-shadow: 0 0 10px rgba(0,198,255,0.5);
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;

        border: none;
        border-radius: 10px;

        font-size: 15px;
        font-weight: 600;
        color: white;

        cursor: pointer;

        background: linear-gradient(135deg, #00c6ff, #0072ff);
        transition: 0.3s ease;
    }

    button:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.35);
    }

    .back {
        margin-top: 12px;
        display: block;
        text-align: center;
        color: white;
        font-size: 13px;
        opacity: 0.85;
        text-decoration: none;
    }

    .back:hover {
        opacity: 1;
        text-decoration: underline;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

</style>

</head>
<body>

<div class="glow"></div>

<div class="wrapper">

    <!-- LEFT SIDE -->
    <div class="info">
        <div class="badge">Employee Creation Panel</div>
        <h1>Add New Employee 🚀</h1>
        <p>
            Create and register new employees into the system.
            Maintain structured records with clean and fast data entry.
        </p>
    </div>

    <!-- RIGHT FORM -->
    <div class="card">

        <h2>Employee Form</h2>

        <form action="/add" method="post">

            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" placeholder="Enter Name" required>
            </div>

            <div class="form-group">
                <label>Mobile</label>
                <input type="number" name="mobile" placeholder="Enter Mobile Number" required>
            </div>

            <div class="form-group">
                <label>Salary</label>
                <input type="number" name="salary" placeholder="Enter Salary" required>
            </div>

            <div class="form-group">
                <label>Department</label>
                <input type="text" name="department" placeholder="Enter Department" required>
            </div>

            <div class="form-group">
                <label>Date of Joining</label>
                <input type="date" name="doj" required>
            </div>

            <button type="submit">Save Employee</button>

        </form>

        <a href="/" class="back">← Back to Dashboard</a>

    </div>

</div>

</body>
</html>
