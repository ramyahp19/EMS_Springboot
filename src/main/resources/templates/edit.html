<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EMS - Edit Employee</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Arial, sans-serif;
    }

    body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;

        background: url("https://images.unsplash.com/photo-1554224155-6726b3ff858f?auto=format&fit=crop&w=1600&q=80")
        no-repeat center center/cover;

        position: relative;
        overflow: hidden;
    }

    body::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(120deg, rgba(0,0,0,0.75), rgba(0,0,0,0.45));
    }

    /* floating glow */
    .glow {
        position: absolute;
        width: 320px;
        height: 320px;
        background: rgba(0,114,255,0.25);
        filter: blur(90px);
        border-radius: 50%;
        top: 10%;
        right: 10%;
        animation: float 7s infinite ease-in-out;
    }

    @keyframes float {
        0%,100% { transform: translateY(0); }
        50% { transform: translateY(-35px); }
    }

    /* MAIN WRAPPER */
    .wrapper {
        position: relative;
        z-index: 2;
        width: 90%;
        max-width: 1000px;

        display: flex;
        gap: 40px;
        align-items: center;
    }

    /* LEFT INFO */
    .info {
        flex: 1;
        color: white;
    }

    .badge {
        display: inline-block;
        padding: 6px 14px;
        background: rgba(255,255,255,0.15);
        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 20px;
        font-size: 12px;
        margin-bottom: 12px;
    }

    .info h1 {
        font-size: 40px;
        margin-bottom: 10px;
    }

    .info p {
        font-size: 15px;
        opacity: 0.85;
        line-height: 1.6;
    }

    /* FORM CARD */
    .card {
        flex: 1;
        background: rgba(255,255,255,0.12);
        backdrop-filter: blur(15px);

        border: 1px solid rgba(255,255,255,0.2);
        border-radius: 18px;

        padding: 30px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.3);

        animation: fadeIn 0.8s ease;
    }

    .card h2 {
        text-align: center;
        color: white;
        margin-bottom: 20px;
        font-size: 24px;
    }

    table {
        width: 100%;
        border-spacing: 0 12px;
    }

    td {
        color: white;
        font-size: 14px;
    }

    label {
        font-weight: 500;
    }

    input {
        width: 100%;
        padding: 12px 14px;

        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.3);

        background: rgba(255,255,255,0.92);
        outline: none;

        font-size: 14px;
        transition: 0.3s;
    }

    input:focus {
        border-color: #00c6ff;
        box-shadow: 0 0 10px rgba(0,198,255,0.5);
    }

    span {
        margin-left: 8px;
        font-size: 12px;
        color: #ddd;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;

        border: none;
        border-radius: 10px;

        font-size: 15px;
        font-weight: 600;
        color: white;

        cursor: pointer;

        background: linear-gradient(135deg, #00c6ff, #0072ff);
        transition: 0.3s ease;
    }

    button:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.35);
    }

    .back {
        margin-top: 10px;
        display: block;
        text-align: center;
        color: white;
        font-size: 13px;
        opacity: 0.85;
        text-decoration: none;
    }

    .back:hover {
        opacity: 1;
        text-decoration: underline;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

</style>

</head>
<body>

<div class="glow"></div>

<div class="wrapper">

    <!-- LEFT SIDE -->
    <div class="info">
        <div class="badge">Employee Editor Panel</div>
        <h1>Edit Employee ✏️</h1>
        <p>
            Update employee details like name, salary, department, and contact information.
            Keep your records clean and up to date.
        </p>
    </div>

    <!-- RIGHT SIDE FORM -->
    <div class="card">

        <h2>Update Details</h2>

        <form action="/update" method="post">

            <input type="hidden" name="id" th:value="${emp.id}">

            <table>

                <tr>
                    <td><label>Name</label></td>
                    <td><input type="text" name="name" th:value="${emp.name}"></td>
                </tr>

                <tr>
                    <td><label>Mobile</label></td>
                    <td><input type="number" name="mobile" th:value="${emp.mobile}"></td>
                </tr>

                <tr>
                    <td><label>Salary</label></td>
                    <td>
                        <input type="number" name="salary" th:value="${emp.salary}">
                        <span>per year</span>
                    </td>
                </tr>

                <tr>
                    <td><label>Department</label></td>
                    <td><input type="text" name="department" th:value="${emp.department}"></td>
                </tr>

                <tr>
                    <td><label>Date of Joining</label></td>
                    <td><input type="date" name="doj" th:value="${emp.doj}"></td>
                </tr>

            </table>

            <button type="submit">Update Employee</button>

            <a href="/" class="back">← Back to Dashboard</a>

        </form>

    </div>

</div>

</body>
</html>
